<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<label for="name">Name</label>
		<input type="text" id="name" placeholder="Name">
		<label for="phone">Phone Number</label>
		<input type="text" id="phone" placeholder="Phone Number">
		<label for="address">Address</label>
		<input type="text" id="address" placeholder="Address">
		<label for="checkbox">Have you ever lived with a Dog?</label>
		<select id="checkbox" type="checkbox" value="Have you ever lived with a Dog?">
			<option>Yes</option>
			<option>No</option>
		</select>
		<label for="multiSelect"Please select your prefeered breed></label>
		<select id="multiSelect" multiple>
		<option>Doberman</option>
		<option>Golden Retriever</option>
		<option>Bull Dog</option>
		</select>
		<button type="submit" id="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
